name: CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'deploy/helm/**'
      - '.github/workflows/ci.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/web/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: samatdev/continental-web

jobs:
  # ── Lint & type-check ──────────────────────────────────────────────────────
  lint:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: apps/web/yarn.lock

      - run: yarn install --frozen-lockfile
      - run: yarn type-check
      - run: yarn lint

  # ── Build & push Docker image ─────────────────────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: apps/web
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ── GitOps: bump image tag → ArgoCD picks it up ───────────────────────────
  gitops:
    name: Update image tag
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITOPS_TOKEN }}

      - name: Patch image tag in values.yaml
        run: |
          TAG="${{ needs.build.outputs.image_tag }}"
          sed -i "s/^  tag: .*/  tag: \"${TAG}\"/" deploy/helm/continental/values.yaml
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/helm/continental/values.yaml
          git diff --cached --quiet || git commit -m "chore: bump image tag to ${TAG}"
          git push
